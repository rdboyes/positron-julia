name: Release VSIX

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, no leading v). Example: 0.2.0'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.+-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (expected MAJOR.MINOR.PATCH, optionally with -prerelease or +build)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if tag already exists
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump package.json version
        run: |
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npm run package

      - name: Locate VSIX artifact
        run: |
          VSIX_FILE="$(ls -1 positron-julia-${VERSION}.vsix 2>/dev/null || true)"
          if [[ -z "$VSIX_FILE" ]]; then
            echo "::error::Expected positron-julia-${VERSION}.vsix but it was not produced."
            ls -1 *.vsix || true
            exit 1
          fi
          echo "VSIX_FILE=$VSIX_FILE" >> "$GITHUB_ENV"

      - name: Commit version bump and create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version change to commit (package.json already at ${VERSION})."
          else
            git commit -m "chore(release): ${TAG}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: ${{ env.VSIX_FILE }}
