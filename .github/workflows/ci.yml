name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  extension-build:
    name: Extension Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: positron-julia-vsix
          path: '*.vsix'

  julia-runtime-tests:
    name: Julia Runtime Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Run Positron.jl tests
        run: julia --project=./julia/Positron -e 'using Pkg; Pkg.test()'
